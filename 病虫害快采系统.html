<body>

<script>
    // 全局状态
    let currentPointId = null;
    let globalInspectorName = "";
    let currentDetail = {
        name: '',
        type: '',
        multiMode: false,
        counts: [0, 0, 0],
        singleCount: 0
    };

    // DOM 元素
    const homePage = document.getElementById('homePage');
    const detailPage = document.getElementById('detailPage');
    const homePointSpan = document.getElementById('homePointId');
    const detailPointSpan = document.getElementById('detailPointId');
    const globalInspectorInput = document.getElementById('globalInspector');
    const backHomeBtn = document.getElementById('backHomeBtn');
    const detailDynamic = document.getElementById('detailDynamicContent');
    const globalMsgHome = document.getElementById('globalMsgHome');
    const detailMsgBox = document.getElementById('detailMsg');

    // 后端地址
    const BACKEND_URL = 'http://localhost:8000';

    // 显示消息
    function showMessageHome(msg, isError = false) {
        globalMsgHome.innerHTML = isError ? `❌ ${msg}` : `📢 ${msg}`;
        globalMsgHome.style.color = isError ? '#ffaa99' : '#d4e6b0';
        setTimeout(() => {
            if (globalMsgHome && homePage.classList.contains('hidden-page') === false) {
                globalMsgHome.innerHTML = '📋 点击任意病害/虫害开始计数';
            }
        }, 3000);
    }

    function showDetailMessage(msg, isError = false) {
        detailMsgBox.innerHTML = isError ? `⚠️ ${msg}` : `✅ ${msg}`;
        detailMsgBox.style.color = isError ? '#ffbc9f' : '#c6f7c6';
        setTimeout(() => {
            if (detailMsgBox && detailPage.classList.contains('hidden-page') === false) {
                detailMsgBox.innerHTML = '等待填写数据';
            }
        }, 3000);
    }

    // 姓名存储
    function saveInspector(name) {
        if (name && name.trim() !== "") {
            localStorage.setItem('pest_inspector_v3', name.trim());
            globalInspectorName = name.trim();
        } else {
            globalInspectorName = "";
            localStorage.removeItem('pest_inspector_v3');
        }
    }

    function loadInspector() {
        const saved = localStorage.getItem('pest_inspector_v3');
        if (saved) {
            globalInspectorName = saved;
            globalInspectorInput.value = saved;
        } else {
            globalInspectorInput.value = "";
            globalInspectorName = "";
        }
    }

    // URL参数
    function getPointIdFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let pid = urlParams.get('point_id');
        if (!pid) pid = urlParams.get('pointId');
        if (pid && pid.trim() !== "") return pid.trim();
        return "DEMO-FIELD-01";
    }

    // 离线队列
    const PENDING_KEY = 'pest_pending_v3';
    function getPendingQueue() {
        const raw = localStorage.getItem(PENDING_KEY);
        if (!raw) return [];
        try { return JSON.parse(raw); } catch (e) { return []; }
    }
    function savePendingQueue(queue) {
        localStorage.setItem(PENDING_KEY, JSON.stringify(queue));
    }
    function addPendingRecord(data) {
        const q = getPendingQueue();
        q.push({ ...data, pending_time: new Date().toISOString() });
        savePendingQueue(q);
        showDetailMessage(`⚠️ 网络异常，数据已本地暂存 (待传${q.length}条)`, true);
        setTimeout(() => retryAllPending(), 5000);
    }

    async function submitToServer(payload) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        try {
            const response = await fetch(`${BACKEND_URL}/submit`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }
            return await response.json();
        } catch (err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }

    async function retryAllPending() {
        const queue = getPendingQueue();
        if (queue.length === 0) return;
        const successIndices = [];
        for (let i = 0; i < queue.length; i++) {
            try {
                await submitToServer(queue[i]);
                successIndices.push(i);
            } catch (e) {
                console.warn("重传失败", e);
            }
        }
        if (successIndices.length > 0) {
            const newQueue = queue.filter((_, idx) => !successIndices.includes(idx));
            savePendingQueue(newQueue);
            if (detailPage.classList.contains('hidden-page') === false) {
                showDetailMessage(`📤 成功重传 ${successIndices.length} 条离线数据`, false);
            }
        }
    }

    // 提交当前数据
    async function submitCurrentData() {
        let inspector = globalInspectorInput.value.trim();
        if (!inspector) {
            showDetailMessage("请填写采集员姓名", true);
            globalInspectorInput.focus();
            return false;
        }
        globalInspectorName = inspector;
        saveInspector(inspector);

        if (!currentPointId) currentPointId = getPointIdFromUrl();

        const now = new Date();
        const timestamp = now.toISOString();
        let pestCountValue;
        let subCounts = null;

        if (currentDetail.multiMode && currentDetail.name === "蓟马") {
            subCounts = {
                leaf1: currentDetail.counts[0],
                leaf2: currentDetail.counts[1],
                leaf3: currentDetail.counts[2]
            };
            pestCountValue = currentDetail.counts[0] + currentDetail.counts[1] + currentDetail.counts[2];
        } else {
            pestCountValue = currentDetail.singleCount;
        }

        const payload = {
            point_id: currentPointId,
            inspector_name: globalInspectorName,
            pest_type: currentDetail.name,
            category: currentDetail.type || "unknown",
            pest_count: pestCountValue,
            timestamp: timestamp,
            unix_ms: now.getTime()
        };

        if (subCounts) {
            payload.detailed_counts = subCounts;
        }

        console.log("提交数据:", payload);

        const submitBtn = document.querySelector('#submitDetailBtn');
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.innerText = "⏳ 提交中...";
        }

        try {
            const result = await submitToServer(payload);
            showDetailMessage(`✅ 提交成功！${currentDetail.name} 数量已记录`, false);
            // 提交成功后不清零，保持当前数量方便连续采集
            setTimeout(() => retryAllPending(), 1000);
            return true;
        } catch (err) {
            console.error("提交错误:", err);
            let errorMsg = err.message;
            if (err.name === 'AbortError') errorMsg = "网络超时";
            showDetailMessage(`提交失败: ${errorMsg}，已本地保存`, true);
            addPendingRecord(payload);
            return false;
        } finally {
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.innerText = "📡 提交数据";
            }
        }
    }

    // 渲染详情页
    function renderDetailPage(name, type, multiMode) {
        currentDetail = {
            name: name,
            type: type,
            multiMode: multiMode,
            counts: [0, 0, 0],
            singleCount: 0
        };

        let html = `<div class="detail-header"><div class="detail-name">🔍 ${name}</div></div>`;

        if (multiMode && name === "蓟马"&"蚜虫") {
            const labels = ["第1片叶/枝", "第2片叶/枝", "第3片叶/枝"];
            for (let i = 0; i < 3; i++) {
                html += `
                    <div class="field-card stepper-item" data-index="${i}">
                        <div class="field-label">🌿 ${labels[i]}</div>
                        <div class="count-digit" id="multiCount_${i}">0</div>
                        <div class="btn-row">
                            <button class="step-btn" data-multi-idx="${i}" data-step="1">+1</button>
                            <button class="step-btn" data-multi-idx="${i}" data-step="3">+3</button>
                            <button class="step-btn" data-multi-idx="${i}" data-step="5">+5</button>
                            <button class="step-btn reset-btn-sm" data-multi-idx="${i}" data-reset="true">归零</button>
                        </div>
                    </div>
                `;
            }
        } else {
            html += `
                <div class="field-card">
                    <div class="field-label">🐛 发生数量 (头/株/叶片)</div>
                    <div class="count-digit" id="singleCountDisplay">0</div>
                    <div class="btn-row">
                        <button class="step-btn" data-step="1">+1</button>
                        <button class="step-btn" data-step="3">+3</button>
                        <button class="step-btn" data-step="5">+5</button>
                        <button class="step-btn" data-step="10">+10</button>
                        <button class="step-btn reset-btn-sm" id="resetSingleBtn">归零</button>
                    </div>
                </div>
            `;
        }
        html += `<button id="submitDetailBtn" class="submit-btn-large">📡 提交数据</button>`;
        detailDynamic.innerHTML = html;

        // 绑定事件
        if (multiMode && (name === "蓟马" || name === "蚜虫") {
            for (let i = 0; i < 3; i++) {
                const updateDisplay = () => {
                    const span = document.getElementById(`multiCount_${i}`);
                    if (span) span.innerText = currentDetail.counts[i];
                };
